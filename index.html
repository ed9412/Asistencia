<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia App</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<!-- QR -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginScreen" class="screen active">
  <div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Correo">
    <small id="error-email" class="field-error"></small>

    <input id="password" type="password" placeholder="Contraseña">
    <small id="error-password" class="field-error"></small>

    <button onclick="login()">Entrar</button>
    <button onclick="registrar()">Crear cuenta</button>
  </div>
</div>

<div id="app" style="display:none">

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <h2>Dashboard</h2>
</div>

<!-- ESTUDIANTES -->
<div id="estudiantes" class="screen">
  <h2>Estudiantes</h2>

  <input id="cedula" placeholder="Cédula">
  <input id="nombres" placeholder="Nombres">
  <input id="apellidos" placeholder="Apellidos">

  <button onclick="crearEstudiante()">Guardar</button>

  <ul id="listaEstudiantes"></ul>
</div>

<!-- FICHA ALUMNO -->
<div id="detalleAlumno" class="screen">
  <h2>Ficha alumno</h2>

  <p id="detalleCedula"></p>

  <input id="editarNombres">
  <small id="error-editarNombres" class="field-error"></small>

  <input id="editarApellidos">
  <small id="error-editarApellidos" class="field-error"></small>

  <button onclick="guardarAlumno()">Guardar</button>

  <h3>Materias</h3>
  <ul id="materiasAlumno"></ul>

  <select id="agregarMateriaSelect"></select>
  <button onclick="agregarMateriaAlumno()">Agregar materia</button>

  <button onclick="mostrar('estudiantes')">Volver</button>
</div>

<!-- MATERIAS -->
<div id="materiasScreen" class="screen">
  <h2>Materias</h2>

  <input id="materiaNombre">
  <button onclick="crearMateria()">Crear</button>

  <ul id="listaMaterias"></ul>
</div>

<!-- EDITAR MATERIA -->
<div id="editarMateriaScreen" class="screen">
  <h2>Editar materia</h2>

  <input id="editarMateriaNombre">
  <small id="error-editarMateriaNombre" class="field-error"></small>

  <button onclick="guardarMateria()">Guardar</button>
</div>

<div class="navbar">
  <button onclick="mostrar('dashboard')">🏠</button>
  <button onclick="mostrar('estudiantes')">👨‍🎓</button>
  <button onclick="mostrar('materiasScreen')">📚</button>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
