<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asistencia App</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h2>Login</h2>
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <button onclick="registrar()">Crear cuenta</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="dashboard" class="screen">
  <h2>📊 Dashboard</h2>
  <canvas id="grafico"></canvas>
  <button onclick="cargarDashboard()">Actualizar</button>
</div>

<div id="lista" class="screen">
  <h2>✅ Pasar Lista</h2>

  <select id="materiaLista"></select>
  <input type="date" id="fechaLista">

  <button class="big-button" onclick="iniciarLista()">Iniciar</button>

  <button class="big-button" onclick="iniciarEscaner()">📷 Escanear QR</button>

  <div id="reader"></div>

  <input id="manualCedula" placeholder="Cédula">
  <button onclick="registrarManual()">Manual</button>

  <h4>Presentes</h4>
  <ul id="presentes"></ul>

  <h4>Faltantes</h4>
  <ul id="faltantes"></ul>

  <button onclick="cerrarLista()">Guardar</button>
</div>

<div id="estudiantes" class="screen">
  <h2>👨‍🎓 Estudiantes</h2>

  <input id="cedula" placeholder="Cédula">
  <input id="nombres" placeholder="Nombres">
  <input id="apellidos" placeholder="Apellidos">

  <button onclick="crearEstudiante()">Guardar</button>

  <ul id="listaEstudiantes"></ul>
</div>

<div id="historial" class="screen">
  <h2>📅 Historial</h2>

  <input type="date" id="filtroFecha">
  <button onclick="cargarHistorial()">Buscar</button>

  <ul id="historialLista"></ul>
  <button onclick="exportar()">Exportar</button>
</div>

<div class="screen" id="reportes">
  <h2>📈 Reportes</h2>

  <input id="cedulaReporte" placeholder="Cédula">
  <button onclick="generarReporte()">Ver</button>

  <ul id="reporte"></ul>
</div>

<div class="screen" id="alertasScreen">
  <h2>🚨 Alertas</h2>
  <button onclick="generarAlertas()">Actualizar</button>
  <ul id="alertas"></ul>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="mostrar('dashboard')">📊</button>
  <button onclick="mostrar('lista')">✅</button>
  <button onclick="mostrar('estudiantes')">👨‍🎓</button>
  <button onclick="mostrar('historial')">📅</button>
  <button onclick="mostrar('reportes')">📈</button>
  <button onclick="mostrar('alertasScreen')">🚨</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
