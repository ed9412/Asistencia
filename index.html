<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asistencia App LUis</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Correo">
    <small id="error-email" class="field-error"></small>

    <input id="password" type="password" placeholder="Contraseña">
    <small id="error-password" class="field-error"></small>

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- ESTUDIANTES -->
<div id="estudiantes" class="screen">
  <h2>Estudiantes</h2>

  <input id="cedula" placeholder="Cédula">
  <small id="error-cedula" class="field-error"></small>

  <input id="nombres" placeholder="Nombres">
  <small id="error-nombres" class="field-error"></small>

  <input id="apellidos" placeholder="Apellidos">
  <small id="error-apellidos" class="field-error"></small>

  <button onclick="crearEstudiante()">Guardar</button>

  <ul id="listaEstudiantes"></ul>
</div>

<!-- FICHA DEL ALUMNO -->
<div id="detalleAlumno" class="screen">
  <h2>Ficha alumno</h2>

  <p><b>Cédula:</b> <span id="detalleCedula"></span></p>

  <input id="editarNombres">
  <small id="error-editarNombres" class="field-error"></small>

  <input id="editarApellidos">
  <small id="error-editarApellidos" class="field-error"></small>

  <button onclick="guardarAlumno()">Guardar cambios</button>

  <h3>Materias</h3>
  <ul id="materiasAlumno"></ul>

  <select id="agregarMateriaSelect"></select>
  <button onclick="agregarMateriaAlumno()">Agregar materia</button>

  <button onclick="mostrar('estudiantes')">Volver</button>
</div>

<!-- MATERIAS -->
<div id="materiasScreen" class="screen">
  <h2>Materias</h2>

  <input id="materiaNombre" placeholder="Nombre materia">
  <small id="error-materiaNombre" class="field-error"></small>

  <button onclick="crearMateria()">Crear</button>

  <ul id="listaMaterias"></ul>
</div>

<!-- EDITAR MATERIA -->
<div id="editarMateriaScreen" class="screen">
  <h2>Editar materia</h2>

  <input id="editarMateriaNombre">
  <small id="error-editarMateriaNombre" class="field-error"></small>

  <button onclick="guardarMateria()">Guardar</button>
</div>

<!-- MENU -->
<div class="navbar">
  <button onclick="mostrar('estudiantes')">👨‍🎓</button>
  <button onclick="mostrar('materiasScreen')">📚</button>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
